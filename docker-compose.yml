name: rektslug

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-deploy-service: &default-deploy
  resources:
    limits:
      memory: 2g

x-core-service: &default-core-service
  image: ${REKTSLUG_CORE_IMAGE:-ghcr.io/gptcompany/rektslug-core:latest}
  build:
    context: .
    dockerfile: Dockerfile
  init: true
  extra_hosts:
    - "host.docker.internal:host-gateway"
  env_file: .env
  environment:
    HEATMAP_PROJECT_ROOT: /app
    HEATMAP_CONTAINER_PROJECT_ROOT: /app
    HEATMAP_HOST: 0.0.0.0
    HEATMAP_PORT: 8002
    HEATMAP_API_URL: http://rektslug-api:8002
    HEATMAP_DB_PATH: /var/lib/rektslug-db/liquidations.duckdb
    HEATMAP_CONTAINER_DB_PATH: /var/lib/rektslug-db/liquidations.duckdb
    FEEDBACK_DB_PATH: /var/lib/rektslug-db/signal_feedback.duckdb
    HEATMAP_CONTINUOUS_RUNTIME_REPORT_PATH: /var/lib/nautilus-runtime/portfolio-runtime-snapshot.json
    HEATMAP_CCXT_CATALOG: /var/lib/rektslug-ccxt
    HEATMAP_CONTAINER_CCXT_CATALOG: /var/lib/rektslug-ccxt
    REKTSLUG_GAP_FILL_INTERVAL_SECONDS: ${REKTSLUG_GAP_FILL_INTERVAL_SECONDS:-300}
    QUESTDB_HOST: ${QUESTDB_HOST:-questdb}
    QUESTDB_PORT: ${QUESTDB_PORT:-9009}
    QUESTDB_PG_PORT: ${QUESTDB_PG_PORT:-8812}
    REDIS_HOST: ${REDIS_HOST:-redis}
    REDIS_PORT: ${REDIS_PORT:-6379}
  volumes:
    - ${REKTSLUG_DB_DIR:-/media/sam/2TB-NVMe/liquidationheatmap_db}:/var/lib/rektslug-db
    - ${HEATMAP_CCXT_CATALOG:-/media/sam/1TB/ccxt-data-pipeline/data/catalog}:/var/lib/rektslug-ccxt:ro
    - ${NAUTILUS_RUNTIME_DIR:-/media/sam/1TB/nautilus_dev/runtime}:/var/lib/nautilus-runtime:ro
    - ./specs:/app/specs:ro
  restart: unless-stopped
  logging: *default-logging
  deploy: *default-deploy
  stop_grace_period: 10s

services:
  questdb:
    image: ${QUESTDB_IMAGE:-questdb/questdb:latest}
    container_name: questdb
    ports:
      - "${QUESTDB_HTTP_PORT:-9000}:9000"
      - "${QUESTDB_PG_PORT:-8812}:8812"
      - "${QUESTDB_PORT:-9009}:9009"
    volumes:
      - questdb-data:/var/lib/questdb
    restart: unless-stopped
    logging: *default-logging
    deploy: *default-deploy
    stop_grace_period: 10s

  rektslug-api:
    <<: *default-core-service
    container_name: rektslug-api
    command:
      - uv
      - run
      - uvicorn
      - src.liquidationheatmap.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8002"
    ports:
      - "${HEATMAP_PORT:-8002}:8002"
    depends_on:
      questdb:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "--max-time",
          "5",
          "http://127.0.0.1:8002/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  rektslug-sync:
    <<: *default-core-service
    container_name: rektslug-sync
    command:
      - /bin/bash
      - /app/scripts/run-gapfill-daemon.sh
    depends_on:
      rektslug-api:
        condition: service_healthy
      questdb:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: rektslug-redis
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m

  rektslug-shadow-producer:
    <<: *default-core-service
    container_name: rektslug-shadow-producer
    command:
      - /bin/bash
      - /app/scripts/run-shadow-producer.sh
    depends_on:
      redis:
        condition: service_healthy
    environment:
      HEATMAP_PROJECT_ROOT: /app
      HEATMAP_CONTAINER_PROJECT_ROOT: /app
      HEATMAP_HOST: 0.0.0.0
      HEATMAP_PORT: 8002
      HEATMAP_API_URL: http://rektslug-api:8002
      HEATMAP_DB_PATH: /var/lib/rektslug-db/liquidations.duckdb
      HEATMAP_CONTAINER_DB_PATH: /var/lib/rektslug-db/liquidations.duckdb
      HEATMAP_CCXT_CATALOG: /var/lib/rektslug-ccxt
      HEATMAP_CONTAINER_CCXT_CATALOG: /var/lib/rektslug-ccxt
      REKTSLUG_GAP_FILL_INTERVAL_SECONDS: ${REKTSLUG_GAP_FILL_INTERVAL_SECONDS:-300}
      QUESTDB_HOST: ${QUESTDB_HOST:-questdb}
      QUESTDB_PORT: ${QUESTDB_PORT:-9009}
      QUESTDB_PG_PORT: ${QUESTDB_PG_PORT:-8812}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      HEATMAP_HYPERLIQUID_INFO_FALLBACK_URLS: "${HEATMAP_HYPERLIQUID_INFO_FALLBACK_URLS:-http://host.docker.internal:3001/info,https://api.hyperliquid.xyz/info}"
      REKTSLUG_SHADOW_INTERVAL_SECONDS: "${REKTSLUG_SHADOW_INTERVAL_SECONDS:-300}"
      HEATMAP_ABCI_ROOT: /var/lib/rektslug-hl/periodic_abci_states
    volumes:
      - ${REKTSLUG_DB_DIR:-/media/sam/2TB-NVMe/liquidationheatmap_db}:/var/lib/rektslug-db
      - ${HEATMAP_CCXT_CATALOG:-/media/sam/1TB/ccxt-data-pipeline/data/catalog}:/var/lib/rektslug-ccxt:ro
      - ${HL_ABCI_DIR:-/media/sam/4TB-NVMe/docker-volumes/hyperliquid/hl/data}:/var/lib/rektslug-hl:ro
      - ./data:/app/data
    deploy:
      resources:
        limits:
          memory: 6g
    healthcheck:
      test: ["CMD-SHELL", "find /app/data/cache -name 'hl_sidecar_btcusdt.json' -mmin -10 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 300s

  rektslug-shadow-consumer:
    <<: *default-core-service
    container_name: rektslug-shadow-consumer
    command:
      - uv
      - run
      - python
      - scripts/continuous_consumer.py
      - --shadow-mode
      - --enable-ws-stream
      - --symbols
      - BTCUSDT
      - ETHUSDT
      - --report-interval-secs
      - "300"
      - --report-path
      - /var/lib/rektslug-db/shadow_report.json
    depends_on:
      redis:
        condition: service_healthy
    environment:
      HEATMAP_PROJECT_ROOT: /app
      HEATMAP_CONTAINER_PROJECT_ROOT: /app
      HEATMAP_HOST: 0.0.0.0
      HEATMAP_PORT: 8002
      HEATMAP_API_URL: http://rektslug-api:8002
      HEATMAP_DB_PATH: /var/lib/rektslug-db/liquidations.duckdb
      HEATMAP_CONTAINER_DB_PATH: /var/lib/rektslug-db/liquidations.duckdb
      HEATMAP_CCXT_CATALOG: /var/lib/rektslug-ccxt
      HEATMAP_CONTAINER_CCXT_CATALOG: /var/lib/rektslug-ccxt
      REKTSLUG_GAP_FILL_INTERVAL_SECONDS: ${REKTSLUG_GAP_FILL_INTERVAL_SECONDS:-300}
      QUESTDB_HOST: ${QUESTDB_HOST:-questdb}
      QUESTDB_PORT: ${QUESTDB_PORT:-9009}
      QUESTDB_PG_PORT: ${QUESTDB_PG_PORT:-8812}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ${REKTSLUG_DB_DIR:-/media/sam/2TB-NVMe/liquidationheatmap_db}:/var/lib/rektslug-db
    healthcheck:
      test: ["CMD-SHELL", "find /var/lib/rektslug-db -name 'shadow_report.json' -mmin -10 | grep -q ."]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  rektslug-feedback-consumer:
    <<: *default-core-service
    container_name: rektslug-feedback-consumer
    command:
      - /bin/bash
      - /app/scripts/run-feedback-consumer.sh
    depends_on:
      redis:
        condition: service_healthy
    environment:
      HEATMAP_PROJECT_ROOT: /app
      HEATMAP_CONTAINER_PROJECT_ROOT: /app
      HEATMAP_DB_PATH: /var/lib/rektslug-db/liquidations.duckdb
      HEATMAP_CONTAINER_DB_PATH: /var/lib/rektslug-db/liquidations.duckdb
      FEEDBACK_DB_PATH: /var/lib/rektslug-db/signal_feedback.duckdb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ${REKTSLUG_DB_DIR:-/media/sam/2TB-NVMe/liquidationheatmap_db}:/var/lib/rektslug-db
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "python",
          "-m",
          "src.liquidationheatmap.signals.feedback",
          "--healthcheck",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  questdb-data:
