<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidation Map - 1 Week (Binance)</title>
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background: #fff; margin: 0; padding: 0;">
    <h1 id="pageTitle" style="display: none;"></h1>
    <p id="lastDataPoint" style="display: none;"></p>
    <span id="currentPrice" style="display: none;"></span>
    <div id="liquidation-map" style="width: 100%; height: 600px;"></div>

    <script>
        // 3 Leverage groups (Coinank style)
        const LEVERAGE_GROUPS = {
            'Low leverage':    { tiers: ['5x', '10x'],   color: '#5B8FF9' },
            'Medium leverage': { tiers: ['25x', '50x'],  color: '#B37FEB' },
            'High leverage':   { tiers: ['100x'],         color: '#FF9C6E' }
        };

        function getSymbol() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('symbol') || 'BTCUSDT';
        }

        function getExchange() {
            const urlParams = new URLSearchParams(window.location.search);
            return (urlParams.get('exchange') || 'binance').toLowerCase();
        }

        function formatExchangeLabel(exchange) {
            return exchange.charAt(0).toUpperCase() + exchange.slice(1);
        }

        function getTimeframeDays() {
            const urlParams = new URLSearchParams(window.location.search);
            const days = parseInt(urlParams.get('days') || '7', 10);
            return days === 1 ? 1 : 7;
        }

        function getTimeframeLabel(days) {
            return days === 1 ? '1 Day' : '1 Week';
        }

        function getTimeframeTitle(days) {
            return days === 1 ? '1D' : '1W';
        }

        async function loadLevels() {
            const symbol = getSymbol();
            const exchange = getExchange();
            const timeframeDays = getTimeframeDays();
            const displaySymbol = symbol.replace('USDT', '/USDT');
            const exchangeLabel = formatExchangeLabel(exchange);
            const timeframeLabel = getTimeframeLabel(timeframeDays);
            const timeframeTitle = getTimeframeTitle(timeframeDays);
            // Still set for backward compat, but hidden via CSS
            document.getElementById('pageTitle').textContent =
                `${displaySymbol} Liquidation Map - ${timeframeLabel} (${exchangeLabel})`;
            document.title = `${displaySymbol} Liquidation Map - ${timeframeTitle} (${exchangeLabel})`;

            try {
                const response = await fetch(
                    `/liquidations/levels?symbol=${symbol}&model=openinterest&timeframe=${timeframeDays}`
                );
                const data = await response.json();

                renderLiquidationMap(data, symbol);
            } catch (error) {
                console.error('Error loading levels:', error);
                alert(`Error: ${error.message}`);
            }
        }

        // Group raw liquidations by the 3 leverage groups, aggregating volumes per price level
        function groupByLeverageGroups(liquidations) {
            const grouped = {};
            for (const [groupName, groupDef] of Object.entries(LEVERAGE_GROUPS)) {
                const priceMap = {};
                liquidations.forEach(liq => {
                    if (groupDef.tiers.includes(liq.leverage)) {
                        const price = liq.price_level;
                        if (!priceMap[price]) {
                            priceMap[price] = { price_level: price, volume: 0 };
                        }
                        priceMap[price].volume += parseFloat(liq.volume);
                    }
                });
                grouped[groupName] = Object.values(priceMap);
            }
            return grouped;
        }

        function buildBarTraces(longsGrouped, shortsGrouped) {
            const traces = [];

            // Longs: show in legend (first occurrence of each group)
            for (const [groupName, groupDef] of Object.entries(LEVERAGE_GROUPS)) {
                const longLevels = longsGrouped[groupName] || [];
                traces.push({
                    x: longLevels.map(l => parseFloat(l.price_level)),
                    y: longLevels.map(l => l.volume),
                    type: 'bar',
                    name: groupName,
                    marker: { color: groupDef.color },
                    hovertemplate: `Price: %{x}<br>Volume: %{y:.2f}<br>${groupName}<extra></extra>`,
                    legendgroup: groupName,
                    showlegend: true,
                    yaxis: 'y'
                });
            }

            // Shorts: hide from legend (same legendgroup as longs)
            for (const [groupName, groupDef] of Object.entries(LEVERAGE_GROUPS)) {
                const shortLevels = shortsGrouped[groupName] || [];
                traces.push({
                    x: shortLevels.map(l => parseFloat(l.price_level)),
                    y: shortLevels.map(l => l.volume),
                    type: 'bar',
                    name: groupName,
                    marker: { color: groupDef.color },
                    hovertemplate: `Price: %{x}<br>Volume: %{y:.2f}<br>${groupName}<extra></extra>`,
                    legendgroup: groupName,
                    showlegend: false,
                    yaxis: 'y'
                });
            }

            return traces;
        }

        function renderLiquidationMap(data, symbol) {
            const currentPrice = parseFloat(data.current_price);

            // Show last data point timestamp (hidden DOM element, kept for compatibility)
            const lastTs = data.last_data_timestamp || new Date().toISOString();
            const lastDate = new Date(lastTs);
            document.getElementById('lastDataPoint').textContent =
                `Last data: ${lastDate.toISOString().replace('T', ' ').substring(0, 19)} UTC`;

            // Group by 3 leverage groups
            const longsGrouped = groupByLeverageGroups(data.long_liquidations);
            const shortsGrouped = groupByLeverageGroups(data.short_liquidations);

            let traces = buildBarTraces(longsGrouped, shortsGrouped);

            // Calculate cumulative distributions (raw data, not grouped)
            const allPrices = [...new Set([
                ...data.long_liquidations.map(l => parseFloat(l.price_level)),
                ...data.short_liquidations.map(l => parseFloat(l.price_level))
            ])].sort((a, b) => a - b);

            const cumulativeLong = calculateCumulative(data.long_liquidations, allPrices, currentPrice, true);
            const cumulativeShort = calculateCumulative(data.short_liquidations, allPrices, currentPrice, false);

            // Cumulative Long line with fill (red, descending from right)
            traces.push({
                x: cumulativeLong.prices,
                y: cumulativeLong.values,
                type: 'scatter',
                mode: 'lines',
                name: 'Cumulative Long',
                fill: 'tozeroy',
                fillcolor: 'rgba(232, 104, 74, 0.12)',
                line: { color: '#E8684A', width: 2 },
                showlegend: false,
                yaxis: 'y2'
            });

            // Cumulative Short line with fill (green, ascending from left)
            traces.push({
                x: cumulativeShort.prices,
                y: cumulativeShort.values,
                type: 'scatter',
                mode: 'lines',
                name: 'Cumulative Short',
                fill: 'tozeroy',
                fillcolor: 'rgba(90, 216, 166, 0.12)',
                line: { color: '#5AD8A6', width: 2 },
                showlegend: false,
                yaxis: 'y2'
            });

            // Current price bottom red dot marker
            traces.push({
                x: [currentPrice],
                y: [0],
                type: 'scatter',
                mode: 'markers',
                marker: { color: '#ff0000', size: 8 },
                showlegend: false,
                hoverinfo: 'skip',
                yaxis: 'y'
            });

            const layout = {
                xaxis: {
                    showgrid: true,
                    gridcolor: '#f0f0f0',
                    tickformat: '.0f',
                    rangeslider: { visible: true, thickness: 0.05 }
                },
                yaxis: {
                    showgrid: true,
                    gridcolor: '#f0f0f0',
                    side: 'left',
                    tickformat: '.2s'
                },
                yaxis2: {
                    overlaying: 'y',
                    side: 'right',
                    showgrid: false,
                    tickformat: '.2s'
                },
                paper_bgcolor: '#ffffff',
                plot_bgcolor: '#ffffff',
                font: { color: '#333333', family: 'Arial, sans-serif' },
                barmode: 'stack',
                bargap: 0.1,
                legend: {
                    orientation: 'h',
                    yanchor: 'bottom',
                    y: 1.02,
                    xanchor: 'center',
                    x: 0.5,
                    font: { size: 13 },
                    bgcolor: 'rgba(255,255,255,0)'
                },
                hovermode: 'closest',
                margin: { t: 60, b: 40 },
                // Current price: dashed vertical line (full height)
                shapes: [{
                    type: 'line',
                    x0: currentPrice, x1: currentPrice,
                    y0: 0, y1: 1, yref: 'paper',
                    line: { color: '#ff0000', width: 1.5, dash: 'dash' }
                }],
                // Current price: annotation label above chart
                annotations: [{
                    x: currentPrice,
                    y: 1.06,
                    xref: 'x',
                    yref: 'paper',
                    text: `Current Price\uff1a${Math.round(currentPrice)}`,
                    showarrow: true,
                    arrowhead: 2,
                    arrowcolor: '#ff0000',
                    arrowwidth: 2,
                    ax: 0,
                    ay: 25,
                    font: { color: '#333', size: 13 }
                }]
            };

            Plotly.newPlot('liquidation-map', traces, layout, {responsive: true});
        }

        function calculateCumulative(liquidations, allPrices, currentPrice, isLong = false) {
            // Pre-build volume map in single pass: O(N)
            const volumeMap = {};
            liquidations.forEach(l => {
                const price = parseFloat(l.price_level);
                volumeMap[price] = (volumeMap[price] || 0) + parseFloat(l.volume);
            });

            const sortedPrices = [...allPrices].sort((a, b) => a - b);
            const prices = new Array(sortedPrices.length);
            const values = new Array(sortedPrices.length);

            if (isLong) {
                // Cumulative from right (descending)
                let cumulativeSum = 0;
                for (let i = sortedPrices.length - 1; i >= 0; i--) {
                    cumulativeSum += volumeMap[sortedPrices[i]] || 0;
                    prices[i] = sortedPrices[i];
                    values[i] = cumulativeSum;
                }
            } else {
                // Cumulative from left (ascending)
                let cumulativeSum = 0;
                for (let i = 0; i < sortedPrices.length; i++) {
                    cumulativeSum += volumeMap[sortedPrices[i]] || 0;
                    prices[i] = sortedPrices[i];
                    values[i] = cumulativeSum;
                }
            }

            return { prices, values };
        }

        // Auto-load on page load
        window.onload = () => {
            loadLevels();
        };
    </script>
</body>
</html>
