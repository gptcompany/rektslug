<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquidation Map - 1 Week (Binance)</title>
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <link rel="stylesheet" href="/frontend/styles.css">
</head>
<body style="background: #fff; margin: 0; padding: 0;">
    <h1 id="pageTitle" style="display: none;"></h1>
    <p id="lastDataPoint" style="display: none;"></p>
    <span id="currentPrice" style="display: none;"></span>
    <div
        id="unitControls"
        style="display:none; justify-content:flex-end; gap:8px; margin: 12px 16px 0;"
    >
        <button
            id="unitCoinBtn"
            type="button"
            style="padding:8px 14px; border-radius:8px; border:1px solid #d9d9d9; background:#ffffff; color:#333333;"
        >Coin</button>
        <button
            id="unitUsdBtn"
            type="button"
            style="padding:8px 14px; border-radius:8px; border:1px solid #d9d9d9; background:#ffffff; color:#333333;"
        >USD</button>
    </div>
    <div
        id="loadError"
        style="display:none; margin: 16px; padding: 12px 16px; background:#fff1f0; color:#a8071a; border:1px solid #ffa39e; border-radius:8px; font: 14px/1.4 Arial, sans-serif;"
    ></div>
    <div
        id="variantBadge"
        style="display:none; margin: 12px 16px 0; font: 12px/1.3 Arial, sans-serif; color:#7a4d00; background:#fff7e6; border:1px solid #ffd591; padding:8px 10px; border-radius:8px;"
    ></div>
    <div id="liquidation-map" style="width: 100%; height: 600px;"></div>

    <script>
        // Default 3 leverage groups - hex for solid legend, opacity set on marker
        const DEFAULT_LEVERAGE_GROUPS = {
            'Low leverage':    { tiers: ['5x', '10x'],   color: '#5B8FF9' },
            'Medium leverage': { tiers: ['25x', '50x'],  color: '#B37FEB' },
            'High leverage':   { tiers: ['100x'],         color: '#FF9C6E' }
        };

        const PROFILE_LEVERAGE_GROUPS = {
            'rektslug-ank': {
                'Low leverage':    { tiers: ['25x', '30x', '40x'], color: '#5B8FF9' },
                'Medium leverage': { tiers: ['50x', '60x', '70x'], color: '#B37FEB' },
                'High leverage':   { tiers: ['80x', '90x', '100x'], color: '#FF9C6E' }
            },
            'rektslug-ank-public': {
                'Low leverage':    { tiers: ['25x', '30x', '40x'], color: '#5B8FF9' },
                'Medium leverage': { tiers: ['50x', '60x', '70x'], color: '#B37FEB' },
                'High leverage':   { tiers: ['80x', '90x', '100x'], color: '#FF9C6E' }
            }
        };
        const SUPPORTED_PUBLIC_MAP_SYMBOLS = ['BTCUSDT', 'ETHUSDT'];

        // Parse params from Coinank-style path OR query string (backward compat)
        // Path: /chart/derivatives/liq-map/{exchange}/{symbol}/{timeframe}
        const _pathParts = window.location.pathname.split('/');
        const _liqMapRouteName = _pathParts[3] || '';
        const _isCoinankPath = _pathParts[1] === 'chart' && (
            _liqMapRouteName === 'liq-map'
            || _liqMapRouteName === 'liq-map-v2'
            || _liqMapRouteName === 'liq-map-v3'
        );
        const _TIMEFRAME_DAYS = { '1d': 1, '1w': 7 };

        function getLiqMapVariant() {
            const urlParams = new URLSearchParams(window.location.search);
            const explicit = (urlParams.get('variant') || '').toLowerCase();
            if (explicit === 'v1' || explicit === 'v2' || explicit === 'v3') {
                return explicit;
            }
            if (_liqMapRouteName === 'liq-map-v2') return 'v2';
            if (_liqMapRouteName === 'liq-map-v3') return 'v3';
            return 'v1';
        }

        function getHyperliquidBackendVariant() {
            const urlParams = new URLSearchParams(window.location.search);
            const explicit = (urlParams.get('variant') || '').toLowerCase();
            if (
                explicit === 'default'
                || explicit === 'coinglass-top-position'
                || explicit === 'internal-top-positions'
            ) {
                return explicit;
            }
            const liqMapVariant = getLiqMapVariant();
            if (liqMapVariant === 'v2') return 'coinglass-top-position';
            if (liqMapVariant === 'v3') return 'internal-top-positions';
            return 'default';
        }

        function getSymbol() {
            if (_isCoinankPath && _pathParts[5]) return _pathParts[5].toUpperCase();
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('symbol') || 'BTCUSDT';
        }

        function getExchange() {
            if (_isCoinankPath && _pathParts[4]) return _pathParts[4].toLowerCase();
            const urlParams = new URLSearchParams(window.location.search);
            return (urlParams.get('exchange') || 'binance').toLowerCase();
        }

        function formatExchangeLabel(exchange) {
            return exchange.charAt(0).toUpperCase() + exchange.slice(1);
        }

        function getTimeframeDays() {
            if (_isCoinankPath && _pathParts[6]) {
                return _TIMEFRAME_DAYS[_pathParts[6].toLowerCase()] || 7;
            }
            const urlParams = new URLSearchParams(window.location.search);
            const days = parseInt(urlParams.get('days') || '7', 10);
            return days === 1 ? 1 : 7;
        }

        function getTimeframeLabel(days) {
            return days === 1 ? '1 Day' : '1 Week';
        }

        function getTimeframeTitle(days) {
            return days === 1 ? '1D' : '1W';
        }

        function getBaseAssetSymbol(symbol) {
            return symbol.replace(/USDT$/i, '');
        }

        function getUnitMode() {
            return getExchange() === 'hyperliquid' ? 'coin' : 'usd';
        }

        function getExplicitProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('profile');
        }

        function getProfile() {
            const explicitProfile = getExplicitProfile();
            if (explicitProfile) return explicitProfile;
            // Canonical liq-map route is CoinAnK-style; default it to the calibrated
            // public CoinAnK-style visual profile unless a specific comparison profile is requested.
            if (
                _isCoinankPath
                && SUPPORTED_PUBLIC_MAP_SYMBOLS.includes(getSymbol())
                && (getTimeframeKey() === '1d' || getTimeframeKey() === '1w')
            ) {
                return 'rektslug-ank-public';
            }
            return null;
        }

        function showFatalError(message) {
            const errorBox = document.getElementById('loadError');
            const chart = document.getElementById('liquidation-map');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            chart.innerHTML = '';
        }

        function updateVariantBadge() {
            const badge = document.getElementById('variantBadge');
            const backendVariant = getHyperliquidBackendVariant();
            if (backendVariant === 'default') {
                badge.style.display = 'none';
                return;
            }
            if (backendVariant === 'coinglass-top-position') {
                badge.textContent = 'Experimental liq-map v2: CoinGlass replay/audit variant. The primary liq-map remains unchanged.';
            } else {
                badge.textContent = 'Experimental liq-map v3: internal top-position-like model. The primary liq-map remains unchanged.';
            }
            badge.style.display = 'block';
        }

        function updateUnitButtons(unitMode) {
            const controls = document.getElementById('unitControls');
            if (getExchange() === 'hyperliquid') {
                controls.style.display = 'none';
                return;
            }
            controls.style.display = 'flex';
            const activeStyle = {
                background: '#111111',
                color: '#ffffff',
                borderColor: '#111111'
            };
            const inactiveStyle = {
                background: '#ffffff',
                color: '#333333',
                borderColor: '#d9d9d9'
            };
            const coinBtn = document.getElementById('unitCoinBtn');
            const usdBtn = document.getElementById('unitUsdBtn');
            Object.assign(coinBtn.style, unitMode === 'coin' ? activeStyle : inactiveStyle);
            Object.assign(usdBtn.style, unitMode === 'usd' ? activeStyle : inactiveStyle);
        }

        function getLeverageGroups(profileName, liquidations) {
            const availableTiers = new Set((liquidations || []).map(liq => liq.leverage));

            // Hyperliquid sidecar uses 'cross' as single leverage tier
            if (availableTiers.has('cross')) {
                return {
                    'Cross margin': { tiers: ['cross'], color: '#5B8FF9' }
                };
            }

            const hasCoinankStyleTiers = (
                availableTiers.has('25x') &&
                availableTiers.has('50x') &&
                availableTiers.has('100x')
            );

            if (profileName && PROFILE_LEVERAGE_GROUPS[profileName]) {
                return PROFILE_LEVERAGE_GROUPS[profileName];
            }
            if (hasCoinankStyleTiers) {
                return PROFILE_LEVERAGE_GROUPS['rektslug-ank-public'];
            }
            return DEFAULT_LEVERAGE_GROUPS;
        }

        function ensureValidPublicMapPayload(data) {
            if (!data || typeof data !== 'object') {
                throw new Error('Invalid public liqmap payload');
            }
            if (!data.grid || typeof data.grid !== 'object') {
                throw new Error('Invalid public liqmap payload');
            }
            if (!Array.isArray(data.long_buckets) || !Array.isArray(data.short_buckets)) {
                throw new Error('Invalid public liqmap payload');
            }
            if (!Array.isArray(data.cumulative_long) || !Array.isArray(data.cumulative_short)) {
                throw new Error('Invalid public liqmap payload');
            }
            if (data.current_price === undefined || data.current_price === null) {
                throw new Error('Invalid public liqmap payload');
            }
            return data;
        }

        function ensureValidLegacyLevelsPayload(data) {
            if (!data || typeof data !== 'object') {
                throw new Error('Invalid liquidation levels payload');
            }
            if (!Array.isArray(data.long_liquidations) || !Array.isArray(data.short_liquidations)) {
                throw new Error('Invalid liquidation levels payload');
            }
            if (data.current_price === undefined || data.current_price === null) {
                throw new Error('Invalid liquidation levels payload');
            }
            return data;
        }

        function calculateCumulative(liquidations, allPrices, currentPrice, isLong = false) {
            const volumeMap = {};
            liquidations.forEach(liq => {
                const price = parseFloat(liq.price_level);
                volumeMap[price] = (volumeMap[price] || 0) + parseFloat(liq.volume);
            });

            const sortedPrices = [...allPrices].sort((a, b) => a - b);
            if (isLong) {
                const relevantPrices = sortedPrices.filter(price => price < currentPrice);
                const cumulativeByPrice = new Map();
                let cumulativeSum = 0;
                for (let i = relevantPrices.length - 1; i >= 0; i--) {
                    const price = relevantPrices[i];
                    cumulativeSum += volumeMap[price] || 0;
                    cumulativeByPrice.set(price, cumulativeSum);
                }
                return {
                    prices: [...relevantPrices, currentPrice],
                    values: [...relevantPrices.map(price => cumulativeByPrice.get(price) || 0), 0],
                };
            }

            const relevantPrices = sortedPrices.filter(price => price > currentPrice);
            const prices = [currentPrice];
            const values = [0];
            let cumulativeSum = 0;
            for (const price of relevantPrices) {
                cumulativeSum += volumeMap[price] || 0;
                prices.push(price);
                values.push(cumulativeSum);
            }
            return { prices, values };
        }

        function enrichBuckets(liquidations) {
            return liquidations.map(liq => {
                const price = Number(liq.price_level);
                const usdVolume = Number(liq.volume);
                const coinVolume = price > 0 ? usdVolume / price : 0;
                return {
                    price_level: price,
                    leverage: liq.leverage,
                    volume: usdVolume,
                    volume_usd: usdVolume,
                    volume_coin: coinVolume,
                };
            });
        }

        function getBucketValue(liq, unitMode) {
            return unitMode === 'coin' ? liq.volume_coin : liq.volume_usd;
        }

        function buildCumulativeSeries(liquidations, currentPrice, unitMode, isLong = false) {
            const volumeMap = new Map();
            const usdMap = new Map();
            const coinMap = new Map();
            liquidations.forEach(liq => {
                const price = Number(liq.price_level);
                volumeMap.set(price, (volumeMap.get(price) || 0) + getBucketValue(liq, unitMode));
                usdMap.set(price, (usdMap.get(price) || 0) + liq.volume_usd);
                coinMap.set(price, (coinMap.get(price) || 0) + liq.volume_coin);
            });

            const sortedPrices = [...volumeMap.keys()].sort((a, b) => a - b);
            if (isLong) {
                const relevantPrices = sortedPrices.filter(price => price < currentPrice);
                const cumulativeByPrice = new Map();
                const cumulativeUsdByPrice = new Map();
                const cumulativeCoinByPrice = new Map();
                let cumulativeSum = 0;
                let cumulativeUsd = 0;
                let cumulativeCoin = 0;
                for (let i = relevantPrices.length - 1; i >= 0; i--) {
                    const price = relevantPrices[i];
                    cumulativeSum += volumeMap.get(price) || 0;
                    cumulativeUsd += usdMap.get(price) || 0;
                    cumulativeCoin += coinMap.get(price) || 0;
                    cumulativeByPrice.set(price, cumulativeSum);
                    cumulativeUsdByPrice.set(price, cumulativeUsd);
                    cumulativeCoinByPrice.set(price, cumulativeCoin);
                }
                return {
                    prices: [...relevantPrices, currentPrice],
                    values: [...relevantPrices.map(price => cumulativeByPrice.get(price) || 0), 0],
                    usdValues: [...relevantPrices.map(price => cumulativeUsdByPrice.get(price) || 0), 0],
                    coinValues: [...relevantPrices.map(price => cumulativeCoinByPrice.get(price) || 0), 0],
                };
            }

            const relevantPrices = sortedPrices.filter(price => price > currentPrice);
            const prices = [currentPrice];
            const values = [0];
            const usdValues = [0];
            const coinValues = [0];
            let cumulativeSum = 0;
            let cumulativeUsd = 0;
            let cumulativeCoin = 0;
            for (const price of relevantPrices) {
                cumulativeSum += volumeMap.get(price) || 0;
                cumulativeUsd += usdMap.get(price) || 0;
                cumulativeCoin += coinMap.get(price) || 0;
                prices.push(price);
                values.push(cumulativeSum);
                usdValues.push(cumulativeUsd);
                coinValues.push(cumulativeCoin);
            }
            return { prices, values, usdValues, coinValues };
        }

        function normalizeLegacyLevelsPayload(data, timeframeDays) {
            const currentPrice = Number(data.current_price);
            const longBuckets = data.long_liquidations.map(liq => ({
                price_level: Number(liq.price_level),
                leverage: liq.leverage,
                volume: Number(liq.volume)
            }));
            const shortBuckets = data.short_liquidations.map(liq => ({
                price_level: Number(liq.price_level),
                leverage: liq.leverage,
                volume: Number(liq.volume)
            }));
            const allPrices = [...new Set([
                ...longBuckets.map(liq => Number(liq.price_level)),
                ...shortBuckets.map(liq => Number(liq.price_level))
            ])].sort((a, b) => a - b);
            const [xMin, xMax] = computeDisplayRange(allPrices, currentPrice, timeframeDays);
            const cumulativeLong = calculateCumulative(longBuckets, allPrices, currentPrice, true);
            const cumulativeShort = calculateCumulative(shortBuckets, allPrices, currentPrice, false);

            return {
                current_price: currentPrice,
                grid: {
                    min_price: xMin,
                    max_price: xMax
                },
                long_buckets: longBuckets,
                short_buckets: shortBuckets,
                cumulative_long: cumulativeLong.prices.map((price, index) => ({
                    price_level: price,
                    value: cumulativeLong.values[index]
                })),
                cumulative_short: cumulativeShort.prices.map((price, index) => ({
                    price_level: price,
                    value: cumulativeShort.values[index]
                })),
                last_data_timestamp: new Date().toISOString()
            };
        }

        function getTimeframeKey() {
            return getTimeframeDays() === 1 ? '1d' : '1w';
        }

        async function loadPublicMap() {
            const symbol = getSymbol();
            const exchange = getExchange();
            const timeframeDays = getTimeframeDays();
            const timeframe = getTimeframeKey();
            const explicitProfile = getExplicitProfile();
            const profile = getProfile();
            const displaySymbol = symbol.replace('USDT', '/USDT');
            const exchangeLabel = formatExchangeLabel(exchange);
            const timeframeLabel = getTimeframeLabel(timeframeDays);
            const timeframeTitle = getTimeframeTitle(timeframeDays);
            // Still set for backward compat, but hidden via CSS
            document.getElementById('pageTitle').textContent =
                `${displaySymbol} Liquidation Map - ${timeframeLabel} (${exchangeLabel})`;
            document.title = `${displaySymbol} Liquidation Map - ${timeframeTitle} (${exchangeLabel})`;
            window.__liqMapLoadError = null;
            document.getElementById('loadError').style.display = 'none';
            updateVariantBadge();

            if (typeof window.Plotly === 'undefined') {
                const message = 'Plotly failed to load from local assets. The chart cannot render.';
                window.__liqMapLoadError = message;
                showFatalError(message);
                return;
            }

            try {
                const isHyperliquid = exchange === 'hyperliquid';
                const isBybit = exchange === 'bybit';
                const usePublicBuilder = _isCoinankPath
                    && (exchange === 'binance' || isBybit)
                    && SUPPORTED_PUBLIC_MAP_SYMBOLS.includes(symbol)
                    && (timeframe === '1d' || timeframe === '1w')
                    && (
                        explicitProfile === null
                        || explicitProfile === 'rektslug-ank-public'
                    );
                let endpointPath, requestParams;
                if (isHyperliquid) {
                    endpointPath = '/liquidations/hl-public-map';
                    requestParams = new URLSearchParams({ symbol, timeframe });
                    const backendVariant = getHyperliquidBackendVariant();
                    if (backendVariant !== 'default') {
                        requestParams.set('variant', backendVariant);
                    }
                } else if (usePublicBuilder) {
                    endpointPath = '/liquidations/coinank-public-map';
                    requestParams = new URLSearchParams({ exchange, symbol, timeframe });
                } else {
                    endpointPath = '/liquidations/levels';
                    requestParams = new URLSearchParams({
                        symbol,
                        model: 'openinterest',
                        timeframe: String(timeframeDays)
                    });
                    if (profile) {
                        requestParams.set('profile', profile);
                    }
                }
                const response = await fetch(`${endpointPath}?${requestParams.toString()}`);
                const rawText = await response.text();
                let data = null;

                if (rawText) {
                    try {
                        data = JSON.parse(rawText);
                    } catch (_parseError) {
                        throw new Error(
                            response.ok
                                ? `Invalid JSON response from ${endpointPath}`
                                : `Liqmap request failed (${response.status})`
                        );
                    }
                }

                if (!response.ok) {
                    throw new Error(
                        (data && (data.detail || data.message || data.error))
                            || `Liqmap request failed (${response.status})`
                    );
                }

                // Stale warning for Hyperliquid data
                if (isHyperliquid && data && data.generated_at) {
                    const genTime = new Date(data.generated_at);
                    const ageMinutes = (Date.now() - genTime.getTime()) / 60000;
                    if (ageMinutes > 30) {
                        const warningDiv = document.createElement('div');
                        warningDiv.style.cssText = 'background:#fff3cd;color:#856404;padding:8px 16px;text-align:center;font-size:13px;border-bottom:1px solid #ffc107;';
                        warningDiv.textContent = `Data may be outdated (last update: ${Math.round(ageMinutes)} min ago)`;
                        document.body.prepend(warningDiv);
                    }
                }

                const normalizedData = (isHyperliquid || usePublicBuilder)
                    ? ensureValidPublicMapPayload(data)
                    : normalizeLegacyLevelsPayload(ensureValidLegacyLevelsPayload(data), timeframeDays);
                window.__liqMapNormalizedData = normalizedData;
                window.__liqMapSymbol = symbol;
                renderLiquidationMap(normalizedData, symbol);
            } catch (error) {
                window.__liqMapLoadError = error.message;
                document.getElementById('lastDataPoint').textContent = `Error: ${error.message}`;
                showFatalError(`Liq map load failed: ${error.message}`);
                console.error('Error loading public liqmap payload:', error);
            }
        }

        // Group raw liquidations by the 3 leverage groups, aggregating volumes per price level
        function groupByLeverageGroups(liquidations, leverageGroups, unitMode) {
            const grouped = {};
            for (const [groupName, groupDef] of Object.entries(leverageGroups)) {
                const priceMap = {};
                liquidations.forEach(liq => {
                    if (groupDef.tiers.includes(liq.leverage)) {
                        const price = liq.price_level;
                        if (!priceMap[price]) {
                            priceMap[price] = {
                                price_level: price,
                                volume: 0,
                                volume_usd: 0,
                                volume_coin: 0
                            };
                        }
                        priceMap[price].volume += getBucketValue(liq, unitMode);
                        priceMap[price].volume_usd += liq.volume_usd;
                        priceMap[price].volume_coin += liq.volume_coin;
                    }
                });
                grouped[groupName] = Object.values(priceMap);
            }
            return grouped;
        }

        function buildBarTraces(
            longsGrouped,
            shortsGrouped,
            leverageGroups,
            unitMode,
            baseAsset,
            longCumulativeMap,
            shortCumulativeMap
        ) {
            const traces = [];

            // Longs: show in legend (first occurrence of each group)
            for (const [groupName, groupDef] of Object.entries(leverageGroups)) {
                const longLevels = longsGrouped[groupName] || [];
                traces.push({
                    x: longLevels.map(l => parseFloat(l.price_level)),
                    y: longLevels.map(l => l.volume),
                    type: 'bar',
                    width: longLevels.map(() => 9.2),
                    name: groupName,
                    marker: { color: groupDef.color, opacity: 0.6 },
                    customdata: longLevels.map(l => [
                        l.volume_usd,
                        l.volume_coin,
                        longCumulativeMap.usd.get(l.price_level) || 0,
                        longCumulativeMap.coin.get(l.price_level) || 0,
                    ]),
                    hoverinfo: 'skip',
                    legendgroup: groupName,
                    showlegend: true,
                    yaxis: 'y'
                });
            }

            // Shorts: hide from legend (same legendgroup as longs)
            for (const [groupName, groupDef] of Object.entries(leverageGroups)) {
                const shortLevels = shortsGrouped[groupName] || [];
                traces.push({
                    x: shortLevels.map(l => parseFloat(l.price_level)),
                    y: shortLevels.map(l => l.volume),
                    type: 'bar',
                    width: shortLevels.map(() => 9.2),
                    name: groupName,
                    marker: { color: groupDef.color, opacity: 0.6 },
                    customdata: shortLevels.map(l => [
                        l.volume_usd,
                        l.volume_coin,
                        shortCumulativeMap.usd.get(l.price_level) || 0,
                        shortCumulativeMap.coin.get(l.price_level) || 0,
                    ]),
                    hoverinfo: 'skip',
                    legendgroup: groupName,
                    showlegend: false,
                    yaxis: 'y'
                });
            }

            return traces;
        }

        function computeDisplayRange(allPrices, currentPrice, timeframeDays) {
            const defaultHalfRangePct = timeframeDays === 1 ? 0.08 : 0.12;
            const minHalfRangePct = timeframeDays === 1 ? 0.05 : 0.08;
            const maxHalfRangePct = timeframeDays === 1 ? 0.12 : 0.18;

            if (!Array.isArray(allPrices) || allPrices.length === 0) {
                return [
                    currentPrice * (1 - defaultHalfRangePct),
                    currentPrice * (1 + defaultHalfRangePct),
                ];
            }

            const sorted = [...allPrices]
                .filter(price => Number.isFinite(price))
                .sort((a, b) => a - b);
            if (!sorted.length) {
                return [
                    currentPrice * (1 - defaultHalfRangePct),
                    currentPrice * (1 + defaultHalfRangePct),
                ];
            }

            const lowerPercentile = timeframeDays === 1 ? 0.05 : 0.02;
            const upperPercentile = timeframeDays === 1 ? 0.95 : 0.98;
            const lowerIndex = Math.max(0, Math.floor((sorted.length - 1) * lowerPercentile));
            const upperIndex = Math.min(
                sorted.length - 1,
                Math.ceil((sorted.length - 1) * upperPercentile),
            );
            const observedMin = Math.min(sorted[lowerIndex], currentPrice);
            const observedMax = Math.max(sorted[upperIndex], currentPrice);
            const observedSpan = Math.max(observedMax - observedMin, currentPrice * 0.01);
            const padding = Math.max(
                observedSpan * 0.06,
                currentPrice * (timeframeDays === 1 ? 0.005 : 0.01),
            );

            let xMin = observedMin - padding;
            let xMax = observedMax + padding;
            const minHalfRange = currentPrice * minHalfRangePct;
            const maxHalfRange = currentPrice * maxHalfRangePct;

            xMin = Math.min(xMin, currentPrice - minHalfRange);
            xMax = Math.max(xMax, currentPrice + minHalfRange);
            xMin = Math.max(xMin, currentPrice - maxHalfRange);
            xMax = Math.min(xMax, currentPrice + maxHalfRange);

            return [Number(xMin.toFixed(2)), Number(xMax.toFixed(2))];
        }

        // Format financial ticks: use B (billion) instead of G (giga), with 2 decimals
        function formatFinancialValue(val) {
            const abs = Math.abs(val);
            if (abs >= 1e9) return (val / 1e9).toFixed(2) + 'B';
            if (abs >= 1e6) return (val / 1e6).toFixed(2) + 'M';
            if (abs >= 1e3) return (val / 1e3).toFixed(2) + 'K';
            return val.toFixed(2);
        }

        function formatAssetValue(val) {
            const abs = Math.abs(val);
            if (abs >= 1e6) return (val / 1e6).toFixed(2) + 'M';
            if (abs >= 1e3) return (val / 1e3).toFixed(2) + 'K';
            if (abs >= 1) return val.toFixed(2);
            if (abs >= 0.01) return val.toFixed(3);
            return val.toFixed(4);
        }

        function formatCurrentPriceLabel(price, symbol) {
            return symbol === 'BTCUSDT' ? Math.round(price).toLocaleString() : price.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        function buildBarHoverTemplate(unitMode, baseAsset, groupName) {
            if (unitMode === 'coin') {
                return `Price: %{x:,.0f}<br>${baseAsset} at level: %{y:,.4f}`
                    + `<br>Cumulative ${baseAsset}: %{customdata[3]:,.4f}`
                    + `<br>Nominal: $%{customdata[0]:,.0f}`
                    + `<br>Cumulative nominal: $%{customdata[2]:,.0f}`
                    + `<br>${groupName}<extra></extra>`;
            }
            return `Price: %{x:,.0f}<br>USD at level: %{y:,.0f}`
                + `<br>Cumulative USD: %{customdata[2]:,.0f}`
                + `<br>${baseAsset}: %{customdata[1]:,.4f}`
                + `<br>Cumulative ${baseAsset}: %{customdata[3]:,.4f}`
                + `<br>${groupName}<extra></extra>`;
        }

        function buildCumulativeHoverTemplate(unitMode, baseAsset) {
            if (unitMode === 'coin') {
                return `Price: %{x:,.0f}<br>Cumulative ${baseAsset}: %{y:,.4f}`
                    + `<br>Cumulative nominal: $%{customdata[0]:,.0f}<extra></extra>`;
            }
            return `Price: %{x:,.0f}<br>Cumulative USD: %{y:,.0f}`
                + `<br>Cumulative ${baseAsset}: %{customdata[1]:,.4f}<extra></extra>`;
        }

        function buildHoverAnchorTrace(buckets, cumulativeMap, unitMode, baseAsset, label, color) {
            const selectedCumulativeMap = unitMode === 'coin' ? cumulativeMap.coin : cumulativeMap.usd;
            return {
                x: buckets.map(bucket => bucket.price_level),
                y: buckets.map(bucket => selectedCumulativeMap.get(bucket.price_level) || 0),
                customdata: buckets.map(bucket => [
                    bucket.volume_usd,
                    bucket.volume_coin,
                    cumulativeMap.usd
                        ? cumulativeMap.usd.get(bucket.price_level) || 0
                        : 0,
                    cumulativeMap.coin
                        ? cumulativeMap.coin.get(bucket.price_level) || 0
                        : 0,
                ]),
                type: 'scatter',
                mode: 'markers',
                name: label,
                marker: {
                    size: 18,
                    color,
                    opacity: 0.001,
                    symbol: 'circle'
                },
                hovertemplate: buildBarHoverTemplate(unitMode, baseAsset, label),
                showlegend: false,
                yaxis: 'y2'
            };
        }

        function buildSnapUpperBounds(sortedPrices) {
            if (!Array.isArray(sortedPrices) || sortedPrices.length === 0) {
                return [];
            }
            const upperBounds = [];
            for (let i = 0; i < sortedPrices.length - 1; i++) {
                upperBounds.push((sortedPrices[i] + sortedPrices[i + 1]) / 2);
            }
            upperBounds.push(Number.POSITIVE_INFINITY);
            return upperBounds;
        }

        function findSnappedIndex(sortedPrices, upperBounds, targetPrice) {
            if (!Array.isArray(sortedPrices) || sortedPrices.length === 0) {
                return -1;
            }
            let low = 0;
            let high = upperBounds.length - 1;
            while (low < high) {
                const mid = Math.floor((low + high) / 2);
                if (targetPrice <= upperBounds[mid]) {
                    high = mid;
                } else {
                    low = mid + 1;
                }
            }
            return low;
        }

        function bindMagneticHover(
            gd,
            currentPrice,
            longHoverBuckets,
            shortHoverBuckets,
            longAnchorCurveNumber,
            shortAnchorCurveNumber
        ) {
            if (gd.__liqMapMouseMoveHandler) {
                gd.removeEventListener('mousemove', gd.__liqMapMouseMoveHandler);
            }
            if (gd.__liqMapMouseLeaveHandler) {
                gd.removeEventListener('mouseleave', gd.__liqMapMouseLeaveHandler);
            }

            let rafPending = false;
            let lastClientX = null;
            let lastHoverKey = null;
            const longPrices = longHoverBuckets.map(bucket => bucket.price_level);
            const shortPrices = shortHoverBuckets.map(bucket => bucket.price_level);
            const longUpperBounds = buildSnapUpperBounds(longPrices);
            const shortUpperBounds = buildSnapUpperBounds(shortPrices);

            const moveHandler = (event) => {
                lastClientX = event.clientX;
                if (rafPending) {
                    return;
                }
                rafPending = true;
                window.requestAnimationFrame(() => {
                    rafPending = false;
                    const xAxis = gd._fullLayout.xaxis;
                    if (!xAxis) {
                        return;
                    }
                    const rect = gd.getBoundingClientRect();
                    const xPx = lastClientX - rect.left;
                    const plotLeft = xAxis._offset;
                    const plotRight = xAxis._offset + xAxis._length;
                    if (xPx < plotLeft || xPx > plotRight) {
                        Plotly.Fx.unhover(gd);
                        lastHoverKey = null;
                        return;
                    }

                    const xMin = Number(xAxis.range[0]);
                    const xMax = Number(xAxis.range[1]);
                    const mousePrice = xMin + ((xPx - plotLeft) / xAxis._length) * (xMax - xMin);
                    const useShortSide = mousePrice >= currentPrice;
                    const targetBuckets = useShortSide ? shortHoverBuckets : longHoverBuckets;
                    const targetPrices = useShortSide ? shortPrices : longPrices;
                    const targetUpperBounds = useShortSide ? shortUpperBounds : longUpperBounds;
                    if (!targetBuckets.length) {
                        Plotly.Fx.unhover(gd);
                        lastHoverKey = null;
                        return;
                    }

                    const snappedIndex = findSnappedIndex(targetPrices, targetUpperBounds, mousePrice);
                    if (snappedIndex < 0) {
                        Plotly.Fx.unhover(gd);
                        lastHoverKey = null;
                        return;
                    }

                    const curveNumber = useShortSide ? shortAnchorCurveNumber : longAnchorCurveNumber;
                    const hoverKey = `${curveNumber}:${snappedIndex}`;
                    if (hoverKey === lastHoverKey) {
                        return;
                    }
                    lastHoverKey = hoverKey;
                    Plotly.Fx.hover(gd, [{ curveNumber, pointNumber: snappedIndex }], ['xy']);
                });
            };

            const leaveHandler = () => {
                lastHoverKey = null;
                Plotly.Fx.unhover(gd);
            };

            gd.__liqMapMouseMoveHandler = moveHandler;
            gd.__liqMapMouseLeaveHandler = leaveHandler;
            gd.addEventListener('mousemove', moveHandler);
            gd.addEventListener('mouseleave', leaveHandler);
        }

        function renderLiquidationMap(data, symbol) {
            const currentPrice = Number(data.current_price);
            const profileName = getProfile();
            const unitMode = getUnitMode();
            const baseAsset = getBaseAssetSymbol(symbol);
            const isHyperliquid = getExchange() === 'hyperliquid';
            document.getElementById('currentPrice').textContent = String(currentPrice);
            window.__liqMapLoadError = null;
            updateUnitButtons(unitMode);

            // Show last data point timestamp (hidden DOM element, kept for compatibility)
            const lastTs = data.last_data_timestamp || new Date().toISOString();
            const lastDate = new Date(lastTs);
            document.getElementById('lastDataPoint').textContent =
                `Last data: ${lastDate.toISOString().replace('T', ' ').substring(0, 19)} UTC`;

            // Group by 3 leverage groups
            const longBuckets = enrichBuckets(data.long_buckets);
            const shortBuckets = enrichBuckets(data.short_buckets);
            const leverageGroups = getLeverageGroups(
                profileName,
                [...longBuckets, ...shortBuckets],
            );
            const longHoverBuckets = [...longBuckets].sort((a, b) => a.price_level - b.price_level);
            const shortHoverBuckets = [...shortBuckets].sort((a, b) => a.price_level - b.price_level);
            const longsGrouped = groupByLeverageGroups(longBuckets, leverageGroups, unitMode);
            const shortsGrouped = groupByLeverageGroups(shortBuckets, leverageGroups, unitMode);
            const cumulativeLong = buildCumulativeSeries(longBuckets, currentPrice, unitMode, true);
            const cumulativeShort = buildCumulativeSeries(shortBuckets, currentPrice, unitMode, false);
            const longCumulativeMap = {
                usd: new Map(cumulativeLong.prices.map((price, index) => [price, cumulativeLong.usdValues[index]])),
                coin: new Map(cumulativeLong.prices.map((price, index) => [price, cumulativeLong.coinValues[index]])),
            };
            const shortCumulativeMap = {
                usd: new Map(cumulativeShort.prices.map((price, index) => [price, cumulativeShort.usdValues[index]])),
                coin: new Map(cumulativeShort.prices.map((price, index) => [price, cumulativeShort.coinValues[index]])),
            };

            let traces = buildBarTraces(
                longsGrouped,
                shortsGrouped,
                leverageGroups,
                unitMode,
                baseAsset,
                longCumulativeMap,
                shortCumulativeMap
            );

            const longAnchorCurveNumber = traces.length;
            traces.push(
                buildHoverAnchorTrace(
                    longHoverBuckets,
                    longCumulativeMap,
                    unitMode,
                    baseAsset,
                    'Long cluster',
                    '#E8684A'
                )
            );
            const shortAnchorCurveNumber = traces.length;
            traces.push(
                buildHoverAnchorTrace(
                    shortHoverBuckets,
                    shortCumulativeMap,
                    unitMode,
                    baseAsset,
                    'Short cluster',
                    '#5AD8A6'
                )
            );

            // Cumulative Long line with fill (red, descending from right)
            traces.push({
                x: cumulativeLong.prices,
                y: cumulativeLong.values,
                customdata: cumulativeLong.prices.map((_, index) => [
                    cumulativeLong.usdValues[index],
                    cumulativeLong.coinValues[index]
                ]),
                type: 'scatter',
                mode: 'lines',
                name: 'Cumulative Long',
                fill: 'tozeroy',
                fillcolor: 'rgba(232, 104, 74, 0.12)',
                line: { color: '#E8684A', width: 2 },
                showlegend: false,
                hoverinfo: 'skip',
                yaxis: 'y2'
            });

            // Cumulative Short line with fill (green, ascending from left)
            traces.push({
                x: cumulativeShort.prices,
                y: cumulativeShort.values,
                customdata: cumulativeShort.prices.map((_, index) => [
                    cumulativeShort.usdValues[index],
                    cumulativeShort.coinValues[index]
                ]),
                type: 'scatter',
                mode: 'lines',
                name: 'Cumulative Short',
                fill: 'tozeroy',
                fillcolor: 'rgba(90, 216, 166, 0.12)',
                line: { color: '#5AD8A6', width: 2 },
                showlegend: false,
                hoverinfo: 'skip',
                yaxis: 'y2'
            });

            // Current price bottom red dot marker
            traces.push({
                x: [currentPrice],
                y: [0],
                type: 'scatter',
                mode: 'markers',
                marker: { color: '#ff0000', size: 8 },
                showlegend: false,
                hoverinfo: 'skip',
                yaxis: 'y'
            });

            const xMin = Number(data.grid.min_price);
            const xMax = Number(data.grid.max_price);

            const layout = {
                xaxis: {
                    showgrid: false,
                    tickformat: '.0f',
                    range: [xMin, xMax],
                    rangeslider: { visible: true, thickness: 0.05 },
                    showspikes: true,
                    spikemode: 'across',
                    spikesnap: 'cursor',
                    spikecolor: '#9ca3af',
                    spikethickness: 1
                },
                yaxis: {
                    showgrid: true,
                    gridcolor: '#f0f0f0',
                    side: 'left',
                    rangemode: 'tozero',
                    title: {
                        text: unitMode === 'coin' ? `${baseAsset} per level` : 'USD nominal per level'
                    },
                    tickvals: [],
                    ticktext: []
                },
                yaxis2: {
                    overlaying: 'y',
                    side: 'right',
                    showgrid: false,
                    rangemode: 'tozero',
                    title: {
                        text: unitMode === 'coin' ? `Cumulative ${baseAsset}` : 'Cumulative USD'
                    },
                    tickvals: [],
                    ticktext: []
                },
                paper_bgcolor: '#ffffff',
                plot_bgcolor: '#ffffff',
                font: { color: '#333333', family: 'Arial, sans-serif', size: 11 },
                barmode: 'stack',
                bargap: 0.02,
                legend: {
                    orientation: 'h',
                    yanchor: 'bottom',
                    y: 1.02,
                    xanchor: 'center',
                    x: 0.5,
                    font: { size: 13 },
                    bgcolor: 'rgba(255,255,255,0)'
                },
                uirevision: `${symbol}-${unitMode}`,
                hoverlabel: {
                    bgcolor: '#ffffff',
                    bordercolor: '#d9d9d9',
                    font: { color: '#222222', size: 12 }
                },
                hovermode: 'closest',
                hoverdistance: 80,
                spikedistance: -1,
                margin: { t: 60, b: 40 },
                // Current price: dashed vertical line (full height)
                shapes: [{
                    type: 'line',
                    x0: currentPrice, x1: currentPrice,
                    y0: 0, y1: 1, yref: 'paper',
                    line: { color: '#ff0000', width: 1.5, dash: 'dash' }
                }],
                annotations: [
                    // Current price: upward arrow at top of dashed line
                    {
                        x: currentPrice,
                        y: 1.0,
                        xref: 'x',
                        yref: 'paper',
                        text: '',
                        showarrow: true,
                        arrowhead: 2,
                        arrowsize: 1.5,
                        arrowcolor: '#ff0000',
                        arrowwidth: 2,
                        ax: 0,
                        ay: 20
                    },
                    // Current price: text label above chart
                    {
                        x: currentPrice,
                        y: 1.08,
                        xref: 'x',
                        yref: 'paper',
                        text: `Current Price: ${formatCurrentPriceLabel(currentPrice, symbol)}`,
                        showarrow: false,
                        font: { color: '#333', size: 13 }
                    }
                ]
            };

            Plotly.react('liquidation-map', traces, layout, {
                responsive: true,
                displayModeBar: true,
                displaylogo: false,
                scrollZoom: false,
                modeBarButtonsToRemove: [
                    'lasso2d',
                    'select2d',
                    'zoomIn2d',
                    'zoomOut2d',
                    'toggleSpikelines',
                    'hoverClosestCartesian',
                    'hoverCompareCartesian',
                    'toImage'
                ]
            }).then(gd => {
                // Generate custom Y-axis ticks with B/M format after plot renders
                const yRange = gd._fullLayout.yaxis.range;
                const y2Range = gd._fullLayout.yaxis2.range;

                function makeTicks(min, max, count) {
                    const step = (max - min) / count;
                    const vals = [];
                    const texts = [];
                    for (let i = 0; i <= count; i++) {
                        const v = min + step * i;
                        vals.push(v);
                        texts.push(unitMode === 'coin' ? formatAssetValue(v) : formatFinancialValue(v));
                    }
                    return { tickvals: vals, ticktext: texts };
                }

                const y1Ticks = makeTicks(yRange[0], yRange[1], 6);
                const y2Ticks = makeTicks(y2Range[0], y2Range[1], 6);

                Plotly.relayout(gd, {
                    'yaxis.tickvals': y1Ticks.tickvals,
                    'yaxis.ticktext': y1Ticks.ticktext,
                    'yaxis2.tickvals': y2Ticks.tickvals,
                    'yaxis2.ticktext': y2Ticks.ticktext
                });

                bindMagneticHover(
                    gd,
                    currentPrice,
                    longHoverBuckets,
                    shortHoverBuckets,
                    longAnchorCurveNumber,
                    shortAnchorCurveNumber
                );
            });
        }

        // Auto-load on page load
        window.onload = () => {
            loadPublicMap();
        };
    </script>
