name: Core Deploy

on:
  push:
    branches: [master]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/**"
      - "src/liquidationheatmap/**"
      - "scripts/deploy-core.sh"
      - "scripts/lib/runtime_env.sh"
      - "scripts/run-ccxt-gap-fill.sh"
      - "scripts/run-gapfill-daemon.sh"
      - "scripts/run-ingestion.sh"
      - "scripts/precompute_heatmap_timeseries.py"
      - ".github/workflows/core-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: core-deploy-v2-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build Core Image
    runs-on: [self-hosted, Linux, X64, muletto]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push core image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/rektslug-core
        run: |
          set -euo pipefail
          image_name="$(printf '%s' "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          sha_tag="sha-${GITHUB_SHA::7}"

          docker build \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "${image_name}:latest" \
            -t "${image_name}:${sha_tag}" \
            -f ./Dockerfile \
            .

          docker push "${image_name}:latest"
          docker push "${image_name}:${sha_tag}"

  deploy:
    name: Deploy Core
    needs: build-and-publish
    runs-on: [self-hosted, Linux, X64, muletto]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart containers
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          git fetch origin
          git checkout master
          git pull --ff-only origin master
          bash ./scripts/deploy-core.sh
          docker image prune -f
