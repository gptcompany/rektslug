name: Core Deploy

on:
  push:
    branches: [master]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "frontend/**"
      - "src/liquidationheatmap/**"
      - "scripts/deploy-core.sh"
      - "scripts/lib/runtime_env.sh"
      - "scripts/run-ccxt-gap-fill.sh"
      - "scripts/run-gapfill-daemon.sh"
      - "scripts/run-ingestion.sh"
      - "scripts/precompute_heatmap_timeseries.py"
      - ".github/workflows/core-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: core-deploy-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build Core Image
    runs-on: [self-hosted, Linux, X64, muletto]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rektslug-core
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Core
    needs: build-and-publish
    runs-on: [self-hosted, Linux, X64, muletto]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and restart containers
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          git fetch origin
          git checkout master
          git pull --ff-only origin master
          bash ./scripts/deploy-core.sh
          docker image prune -f
